worker_processes auto;

events { worker_connections 1024; }

http {
    sendfile on;
    keepalive_timeout 65;

    upstream todo_servers {
        server todo-ws:8000;
        # If you run multiple API containers:
        # server backend1:8000;
        # server backend2:8000;
    }

    # NEW: custom log format
    include /etc/nginx/conf.d/json_format.conf;
    # Select a logging format
    access_log /dev/stdout json_combined;
    # Nginx error logs in default format
    error_log /dev/stderr warn;

    server {
        listen 80;
        server_name _;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;
        # Removed 'unsafe-inline' from Content-Security-Policy (Copilot recommendation).
        # add_header Content-Security-Policy "default-src 'self' http: https: data: blob:" always;
        add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline'" always;
        
        # Gzip compression optimized for a FastAPI REST service
        gzip on;
        gzip_vary on;
        gzip_min_length 1024;  # Only compress files > 1KB
        gzip_proxied any;      # Compress even for proxied requests
        gzip_comp_level 6;     # Balance between speed and compression
        gzip_types
            text/plain
            text/css
            text/xml
            text/javascript
            application/javascript
            application/xml
            application/xml+rss
            application/json
            application/octet-stream;

        # Serve static content using Nginx itself
        location / {
            root /usr/share/nginx/html;
            index index.html;
        }

        # To discover the IP addresses used by Docker containers, use
        # docker network ls
        # docker network inspect homelog_default
        # This location is scraped by Prometheus
        location /nginx_status {
            stub_status;
            allow 127.0.0.1;
            allow ::1;              # IPv6 localhost
            allow 172.0.0.0/8;      # possible Docker bridge network CIDR range
            allow 10.0.0.0/8;       # private IP at KU
            allow 158.108.0.0/16;   # KU public IP
            # allow nginx-exporter; # Copilot says the use of hostname instead of address or CIDR range won't work.
            deny all;
        }

        # If *both* the location path and proxy_pass URL end in a /, 
        # then the location prefix is removed from the request URL passed to 
        # downstream server.
        location /api/ {
            proxy_pass http://todo_servers;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Default timeout unit is seconds, 30 = 30s. Use 'ms' for millisec (30ms).
            # The default timeout is 60s.
            # Factors affecting delay: database latency, large responses, slow network, slow clients.
            proxy_connect_timeout 10s;
            proxy_read_timeout 10s;
            proxy_send_timeout 10s;
        }

        # Application Health check endpoint
        location /health {
            access_log off;
            proxy_pass http://todo_servers/health;
            proxy_set_header Host $host;
        }
    }

    # TODO Get certificates and add a TLS server for port 443
    #server {
    #   listen 443 ssl;
    #   server_name _;

    #   ssl_certificate     /etc/nginx/certs/fullchain.pem;
    #   ssl_certificate_key /etc/nginx/certs/privkey.pem;

    #   location / {
    #       proxy_pass http://fastapi_backend;
    #       proxy_set_header Host $host;
    #       proxy_set_header X-Real-IP $remote_addr;
    #       proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #       proxy_set_header X-Forwarded-Proto https;
    #   }
    #}

}
