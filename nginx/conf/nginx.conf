worker_processes auto;

events { worker_connections 1024; }

http {
    sendfile on;
    keepalive_timeout 65;

    upstream todo_servers {
        server todo-ws:8000;
        # If you run multiple API containers:
        # server backend1:8000;
        # server backend2:8000;
    }

    # custom log format for JSON
    include /etc/nginx/conf.d/json_format.conf;
    # Select a logging format
    access_log /dev/stdout json_combined;
    # Nginx error logs in default format
    error_log /dev/stderr warn;

    server {
        listen 80;
        server_name _;

        # Security headers
        #add_header X-Frame-Options "SAMEORIGIN" always;
        #add_header X-XSS-Protection "1; mode=block" always;
        #add_header X-Content-Type-Options "nosniff" always;
        #add_header Referrer-Policy "no-referrer-when-downgrade" always;
        #add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline'" always;
        
        # Gzip compression optimized for a FastAPI REST service
        #include conf.d/gzip_config.conf

        # Serve static content using Nginx itself
        # Note: 'location /path/' blocks matched using longest-match
        #       not first match.
        location / {
            root /usr/share/nginx/html;
            index index.html;
        }

        # /nginx_status path is used by Prometheus to scrape metrics.
        # It should not be accessible to outside world.
        # To discover the IP addresses of Docker containers, use:
        # docker network ls (to get the network name)
        # docker network inspect network_name

        location /nginx_status {
            stub_status;
            allow 127.0.0.1;
            allow ::1;              # IPv6 localhost
            allow 172.16.0.0/12;    # possible Docker bridge networks
            # Copilot says use of a hostname won't work:
            # allow nginx-exporter; 
            deny all;
        }

        # If *both* the location path and proxy_pass URL end in a /, 
        # then the location prefix is removed from the request URL passed to 
        # downstream server.
        location /api/ {
            # Check if the user is authenticated
            auth_request    /outpost.goauthentik.io/auth/nginx;
            # If not authenticated, redirect them to Authentik
            error_page      401 = @goauthentik_proxy_signin;
            auth_request_set $auth_cookie $upstream_http_set_cookie;
            add_header Set-Cookie $auth_cookie;
            # Also add JWT from Authentik to headers.
            # Authentik passes this internally as 'X-Authentik-Jwt'
            # See README in my Authentik repo for configuration needed
            # to tell Authentik to provide a JWT.
            auth_request_set $auth_token $upstream_http_x_authentik_jwt;
            proxy_set_header Authorization "Bearer $auth_token";

            # Forward request to the backend servers
            proxy_pass http://todo_servers;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;


        }

        # Authentik runs in a different compose project.
        # The nginx container reaches it through a shared external Docker network.
        # Auth subrequests do not need a request body.
        location = /outpost.goauthentik.io/auth/nginx {
            proxy_pass              http://auth-server:9000;
            proxy_set_header        Host todo.localhost;
            proxy_set_header        X-Original-URL $scheme://$http_host$request_uri;
            proxy_set_header        X-Real-IP $remote_addr;
            proxy_set_header        X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_pass_request_body off;
            proxy_set_header        Content-Length "";
        }

        # Browser-facing Authentik routes should proxy normally.
        # The "Host" header (proxy_set_header) should match the "External host"
        # that Authentik is set to authentik for.
        # In the Authentik Admin web UI, select Application -> Providers and
        # look at the configuration of the provider.
        location /outpost.goauthentik.io/ {
            proxy_pass              http://auth-server:9000;
            proxy_set_header        Host todo.localhost;
            proxy_set_header        X-Original-URL $scheme://$http_host$request_uri;
            proxy_set_header        X-Real-IP $remote_addr;
            proxy_set_header        X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Handle the redirect to the login page on Authentik
        location @goauthentik_proxy_signin {
            internal;
            add_header Set-Cookie $auth_cookie;
            # Use a relative path here.
            # Absolute path is in "location /outpost.goauthentik.io"
            return 302 /outpost.goauthentik.io/start?rd=$scheme://$http_host$request_uri;
        }

        # Application Health check endpoint
        location /health {
            access_log off;
            proxy_pass http://todo_servers/health;
            proxy_set_header Host $host;
        }
    }

    # TODO Get certificates and add a TLS server for port 443
    #server {
    #   listen 443 ssl;
    #   server_name _;

    #   ssl_certificate     /etc/nginx/certs/fullchain.pem;
    #   ssl_certificate_key /etc/nginx/certs/privkey.pem;

    #   location / {
    #       proxy_pass http://fastapi_backend;
    #       proxy_set_header Host $host;
    #       proxy_set_header X-Real-IP $remote_addr;
    #       proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #       proxy_set_header X-Forwarded-Proto https;
    #   }
    #}

}
