name: jim-todo

services:
  todo-ws:
    build: .
    # For live updates in development:
    # 1. Use a volume to mount-bind ./src (on host) to /app/ (in container).
    #    This means that changes to the code in ./src will 
    #    be immediately visible in the container.
    # 2. In 'CMD',  include the "--reload" option.
    # For production, you should remove this.
    volumes:
      - ./data:/app/data
    # For production, do not expose port 8000. 
    # Instead, require clients to use nginx as proxy.
    ports:
      - "8000:8000"
    environment:
      ROOT_PATH: /api
      # These values are defined in .env
      TODO_URL: ${TODO_URL}
      # Logging
      LOG_LEVEL: ${LOG_LEVEL}
    healthcheck:
      # Use urllib.request instead of curl. curl may not be installed in Docker image.
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')" ]
      interval: 300s
      timeout: 5s
      retries: 3
    networks:
      - todo-net

  nginx:
    # Nginx web server as proxy. 
    # Listen on port 80 on the native host, mapped to port 80 in container.
    # nginx:alpine is smaller than nginx:stable (52MB vs 199MB) and requires less memory.
    # nginx:alpine includes fewer nginx modules, fewer libraries, and musl libc instead of glibc.
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443" # Reserved for HTTPS, not yet configured in nginx.
    volumes:
      - ./nginx/conf:/etc/nginx:ro
      - ./nginx/html:/usr/share/nginx/html:ro
    depends_on:
      - todo-ws
    networks:
      - todo-net
  
  loki:
    # Loki collects logs from other containers.
    image: grafana/loki
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"
    networks:
      - todo-net
  
  promtail:
    # Promtail scrapes logs from Nginx, formats them, and sends to Loki.
    image: grafana/promtail
    command: -config.file=/etc/promtail/config.yml
    volumes:
      # /var/lib/docker/containers - container files containing the actual log files
      # /var/run/docker.sock - provides metadata such as labels & names
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./promtail/config.yml:/etc/promtail/config.yml:ro
    depends_on:
      - loki
    networks:
      - todo-net

networks:
  todo-net:
    driver: bridge

# Containers on the same network (todo-net) communicate using the
# *internal container ports* not the host-mapped ports.
# Hence, nginx-exporter scrapes nginx on port 80 instead of 8080.
# They also use internal DNS names, like 'nginx' or 'backend'.